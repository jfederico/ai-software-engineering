name: docs-ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            CHANGELOG.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            SUPPORT.md
            VERSIONING.md
            GOVERNANCE.md
            .github/**/*.md

  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            README.md
            CHANGELOG.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            SUPPORT.md
            VERSIONING.md
            GOVERNANCE.md
            .github/pull_request_template.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
